<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문영두 — 풀스택 PD</title>
<meta name="description" content="기획·촬영·편집·디자인·개발까지, 풀스택 PD 문영두의 포트폴리오">
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#070708; --panel:#0E0E10; --panel2:#141416; --raise:#1A160E;
  --line:rgba(196,163,106,.12); --line2:rgba(196,163,106,.24);
  --gold:#C4A36A; --gold2:#DFC489; --gold-dim:rgba(196,163,106,.10);
  --ink:#F4F0E8; --mut:#AFA695; --dim:#786F5F;
  --amber:#C4A36A; --amber2:#DFC489; --amber-dim:rgba(196,163,106,.10);
  --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
  --sans:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --serif:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  --rad:14px; --rad-s:10px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
@media (prefers-reduced-motion:reduce){html{scroll-behavior:auto}}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden;word-break:keep-all;line-break:strict}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(900px 500px at 88% -12%,rgba(196,163,106,.05),transparent 62%),radial-gradient(800px 600px at -8% 25%,rgba(196,163,106,.028),transparent 60%)}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
:focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:4px}
::selection{background:var(--amber);color:#070708}

.wrap{max-width:1120px;margin:0 auto;padding:0 20px;position:relative;z-index:1}
.mono{font-family:var(--mono)}
.mgrp{display:flex;flex:none}
@media (prefers-reduced-motion:reduce){.mgrp:nth-child(2){display:none}.mgrp{flex-wrap:wrap}}
.eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';height:1px;width:18px;background:var(--gold);opacity:.4}
.eyebrow::after{content:'';height:1px;width:18px;background:var(--gold);opacity:.4}

/* ───────── top bar ───────── */
.topbar{position:sticky;top:0;z-index:60;background:rgba(7,7,8,.85);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.topbar .wrap{display:flex;align-items:center;gap:16px;height:58px}
.logo{font-family:var(--mono);font-weight:600;font-size:14px;letter-spacing:.14em;display:flex;align-items:center;gap:9px;white-space:nowrap}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2.4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
@media (prefers-reduced-motion:reduce){.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 2.4s ease-in-out infinite}}
.tc{font-family:var(--mono);font-size:12px;color:var(--dim);letter-spacing:.08em;margin-left:2px}
.navlinks{margin-left:auto;display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}
.navlinks::-webkit-scrollbar{display:none}
.navlinks a{font-size:13.5px;color:var(--mut);padding:8px 12px;border-radius:8px;white-space:nowrap;transition:color .18s,background .18s}
.navlinks a:hover{color:var(--ink);background:rgba(196,163,106,.06)}

/* ───────── hero (viewfinder) ───────── */
.hero{padding:28px 0;min-height:calc(100vh - 58px);display:flex;flex-direction:column;justify-content:center}
.finder{position:relative;padding:clamp(20px,3.5vw,36px) clamp(20px,4.5vw,52px)}
.finder .corner{position:absolute;width:26px;height:26px;border:2px solid var(--amber);opacity:.85}
.finder .c1{top:0;left:0;border-right:none;border-bottom:none}
.finder .c2{top:0;right:0;border-left:none;border-bottom:none}
.finder .c3{bottom:0;left:0;border-right:none;border-top:none}
.finder .c4{bottom:0;right:0;border-left:none;border-top:none}
.finder-head{display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:11.5px;letter-spacing:.16em;color:var(--dim);margin-bottom:clamp(18px,3vw,26px)}
.finder-head .rec{display:flex;align-items:center;gap:8px;color:var(--amber)}
.hero-grid{display:grid;grid-template-columns:1fr auto;gap:clamp(24px,5vw,64px);align-items:center}
.hero-grid>div:first-child{min-width:0}
.hero h1{font-family:var(--serif);font-size:clamp(24px,4.4vw,42px);font-weight:900;line-height:1.3;letter-spacing:-.015em}
.hero h1 .amber{color:var(--amber)}
.hero .role-en{font-family:var(--mono);font-size:clamp(12px,2.4vw,15px);letter-spacing:.32em;color:var(--amber2);margin:18px 0 14px;text-transform:uppercase}
.hero .lede{color:var(--mut);font-size:clamp(15px,2.6vw,17.5px);max-width:34em}
.hero-cta{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:9px;font-weight:700;font-size:14.5px;padding:13px 22px;border-radius:12px;transition:transform .15s,box-shadow .2s,background .2s;border:1px solid transparent}
.btn:active{transform:scale(.97)}
.btn-amber{background:var(--amber);color:#070708;box-shadow:none}
.btn-amber:hover{background:var(--amber2)}
.btn-ghost{border-color:var(--line2);color:var(--ink);background:rgba(196,163,106,.03)}
.btn-ghost:hover{background:rgba(196,163,106,.08)}
.hero-photo{position:relative;width:clamp(150px,22vw,220px)}
.hero-photo img{border-radius:10px;border:1px solid var(--line2);filter:saturate(.9) contrast(1.02);box-shadow:0 20px 50px rgba(0,0,0,.5)}
.hero-photo .tag{position:absolute;left:-10px;bottom:14px;background:var(--gold);color:#070708;font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.16em;padding:5px 11px;border-radius:5px}
@media(max-width:768px){.hero-grid{grid-template-columns:1fr}.hero-photo{order:-1;margin:0 auto;width:min(200px,55vw)}.hero-cta{flex-direction:column;align-items:stretch}.hero-cta .btn{justify-content:center}}
@media(max-width:480px){.hero h1{font-size:19px;letter-spacing:-.02em}}

.env-line{margin-top:32px;padding-top:22px;border-top:1px solid var(--line);font-family:var(--mono);font-size:12px;letter-spacing:.06em;color:var(--mut)}
@media(max-width:768px){.env-line{font-size:11px}}
.hero-skills{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);text-align:center}
.hero-skills-head{font-family:var(--serif);font-weight:800;font-size:clamp(17px,2.6vw,21px);color:var(--ink);margin:18px 0 0;line-height:1.4}
.hero-skills .tool-scroll{margin-top:0}
.hero-skills .env-line{margin:10px 0 0;padding-top:0;border-top:0;line-height:1.7}
.hero-skills .hero-cta{justify-content:center;margin-top:22px}
@media(max-width:768px){.hero-skills{margin-top:14px;padding-top:10px}}

/* ───────── sections ───────── */
section{padding:clamp(48px,8vw,84px) 0}
.sec-head{display:flex;flex-direction:column;gap:12px;margin-bottom:clamp(26px,4.5vw,42px)}
.sec-head h2{font-family:var(--serif);font-size:clamp(24px,4.6vw,34px);font-weight:800;letter-spacing:-.01em}
.sec-head p{color:var(--mut);font-size:15px;max-width:44em}

/* ───────── channel guide (career cards) ───────── */
.ch-list{display:flex;flex-direction:column;gap:14px}
.ch-card{position:relative;display:grid;grid-template-columns:auto 1fr auto;grid-template-areas:"no info thumbs" "no info arrow";gap:clamp(10px,2vw,16px) clamp(16px,3vw,30px);align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:clamp(18px,3vw,26px);transition:border-color .2s,background .2s,transform .18s;cursor:pointer;text-align:left;width:100%}
.ch-card:hover{border-color:rgba(196,163,106,.45);background:var(--panel2);transform:translateY(-2px)}
.ch-no{grid-area:no;font-family:var(--mono);color:var(--dim);font-size:12px;letter-spacing:.14em;display:flex;flex-direction:column;gap:4px;min-width:56px;align-self:start}
.ch-no b{font-size:22px;color:var(--ink);font-weight:600}
.ch-card:hover .ch-no b{color:var(--amber)}
.ch-info{grid-area:info;min-width:0;align-self:start}
.ch-period{font-family:var(--mono);font-size:11.5px;color:var(--amber2);letter-spacing:.1em;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.badge{font-size:10px;font-weight:700;letter-spacing:.1em;padding:3px 9px;border-radius:4px;background:var(--gold-dim);color:var(--gold2);border:1px solid var(--line2)}
.badge.soon{background:rgba(196,163,106,.12);color:var(--mut)}
.ch-info h3{font-family:var(--serif);font-size:clamp(17px,3vw,21px);font-weight:800;letter-spacing:-.005em}
.ch-info .role{color:var(--mut);font-size:13.5px;margin-top:2px}
.ch-info .desc{color:var(--dim);font-size:13px;margin-top:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ch-thumbs{grid-area:thumbs;justify-self:end;display:flex;gap:8px;overflow-x:auto;max-width:min(340px,38vw);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.ch-thumbs::-webkit-scrollbar{display:none}
.ch-thumbs .track{display:flex;width:max-content}
@media(hover:hover){.ch-thumbs .track{animation:chmarquee 26s linear infinite}
  .ch-card:hover .ch-thumbs .track{animation-play-state:paused}}
.ch-thumbs.deco{overflow:hidden;pointer-events:none}
.ch-thumbs.deco .track{animation:chmarquee 26s linear infinite}
@keyframes chmarquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ch-thumbs .th{width:88px;aspect-ratio:16/10;border-radius:9px;overflow:hidden;border:1px solid rgba(196,163,106,.5);background:var(--panel2);position:relative;flex:none;margin-right:8px}
.ch-thumbs .th img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.ch-thumbs .th::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(6,6,7,.55),transparent 60%);pointer-events:none}
.ch-card:hover .ch-thumbs .th img{transform:scale(1.05)}
.ch-thumbs .th.txt{display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px}
.ch-thumbs .th.txt b{font-family:var(--mono);color:var(--amber);font-size:15px}
.ch-thumbs .th.txt span{font-size:9.5px;color:var(--dim);letter-spacing:.04em}
.ch-arrow{grid-area:arrow;justify-self:end;font-family:var(--mono);color:var(--dim);font-size:13px;letter-spacing:.1em;white-space:nowrap;transition:color .2s}
.ch-card:hover .ch-arrow{color:var(--amber)}
@media(max-width:820px){
  .ch-card{grid-template-columns:auto 1fr auto;grid-template-areas:"no info arrow" "thumbs thumbs thumbs"}
  .ch-thumbs{justify-self:stretch;max-width:none}
}
@media(max-width:560px){
  .ch-card{grid-template-columns:auto 1fr;grid-template-areas:"no arrow" "info info" "thumbs thumbs"}
}

/* ───────── skills ───────── */
.skill-one{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad);padding:clamp(30px,5vw,46px);text-align:center}
.skill-one p{font-family:var(--serif);font-size:clamp(18px,2.6vw,23px);font-weight:700;color:var(--ink);max-width:32em;margin:0 auto;line-height:1.5}
.tool-scroll{overflow:hidden;margin-top:16px;-webkit-mask-image:linear-gradient(to right,transparent,#000 6%,#000 94%,transparent);mask-image:linear-gradient(to right,transparent,#000 6%,#000 94%,transparent)}
.tool-track{display:flex;width:max-content;animation:toolscroll linear infinite}
.tool-scroll:hover .tool-track{animation-play-state:paused}
@keyframes toolscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tool-pill{font-family:var(--mono);font-size:12.5px;letter-spacing:.03em;color:var(--mut);border:1px solid var(--line2);padding:9px 16px;border-radius:99px;background:rgba(196,163,106,.03);white-space:nowrap;flex:none;margin-right:10px}
@media (prefers-reduced-motion:reduce){.tool-track{animation:none;flex-wrap:wrap;width:auto;justify-content:center}}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{display:inline-flex;align-items:center;line-height:1.3;font-size:12px;color:var(--mut);border:1px solid var(--line2);padding:5px 11px;border-radius:99px;background:rgba(196,163,106,.03);flex-shrink:0;text-wrap:balance}
.chip.hl{color:var(--amber2);border-color:rgba(196,163,106,.35);background:var(--amber-dim)}
.chip.tag-sm{font-size:10.5px;padding:3px 9px;height:22px}
.hero-sub{color:var(--mut);font-size:14.5px;line-height:1.65;max-width:42em;margin:14px 0 0}

/* ───────── awards ───────── */
.award-list{display:flex;flex-direction:column;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--rad);overflow:hidden}
.award{display:grid;grid-template-columns:76px 1fr 96px auto;gap:10px 18px;align-items:center;background:var(--panel);padding:18px 22px;text-align:left}
.award .yr{font-family:var(--mono);font-size:12.5px;color:var(--dim)}
.award .nm{font-size:15px;font-weight:600}
.award .prize{font-size:11.5px;font-weight:700;color:var(--amber);letter-spacing:.04em}
.award .lk{font-family:var(--mono);font-size:12px;color:var(--mut);white-space:nowrap;padding:7px 12px;border:1px solid var(--line2);border-radius:8px;transition:color .2s,border-color .2s}
.award .lk:hover{color:var(--amber);border-color:rgba(196,163,106,.4)}
@media(max-width:560px){
  .award{grid-template-columns:1fr auto;row-gap:6px}
  .award .yr{grid-column:1/-1}
  .award .nm{grid-column:1/-1}
  .award .prize{grid-column:1}
  .award .lk{grid-column:2;justify-self:end}
}

/* ───────── activities ───────── */

/* ───────── contact / footer ───────── */
.biz-card{display:flex;align-items:stretch;gap:0;background:linear-gradient(135deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:20px;padding:clamp(28px,5vw,46px) clamp(26px,5vw,50px);margin:16px auto 0;max-width:980px}
.biz-left{flex:0 0 auto;display:flex;flex-direction:column;justify-content:center;padding-right:clamp(24px,4vw,40px)}
.biz-div{width:1px;background:var(--line2);align-self:stretch;flex:none}
.biz-name{font-family:var(--serif);font-size:clamp(22px,4vw,28px);font-weight:800;letter-spacing:-.01em}
.biz-name-en{font-family:var(--mono);font-size:11.5px;letter-spacing:.14em;color:var(--dim);margin-top:4px}
.biz-role{font-size:14.5px;color:var(--amber2);font-weight:700;margin-top:10px}
.biz-role-en{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:2px}
.biz-right{flex:1;display:grid;grid-template-columns:auto auto;gap:16px 0;justify-content:start;align-content:center;padding-left:clamp(24px,4vw,40px)}
.biz-right .biz-item:nth-child(even){border-left:1px solid var(--line2);padding-left:clamp(20px,3vw,36px);margin-left:clamp(20px,3vw,36px)}
.biz-item{display:inline-flex;align-items:center;gap:8px;justify-content:flex-start;font-family:var(--mono);font-size:13px;color:var(--mut);transition:color .2s}
.biz-item i{font-style:normal;font-size:13px;color:var(--amber)}
.biz-item:hover{color:var(--ink)}
.biz-qr{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding-left:clamp(20px,3vw,32px)}
.biz-qr svg,.biz-qr img{width:80px;height:80px;display:block}
.biz-qr .qr-cap{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--dim);text-align:center}
.biz-note{text-align:center;color:var(--mut);font-size:13.5px;margin-top:20px}
@media(max-width:640px){.biz-card{flex-direction:column;text-align:center;gap:20px;max-width:none}.biz-left{padding-right:0}.biz-div{display:none}.biz-right{grid-template-columns:1fr;justify-content:center;justify-items:center;gap:12px;padding-left:0}.biz-right .biz-item:nth-child(even){border-left:none;padding-left:0;margin-left:0}.biz-item{justify-content:center}.biz-qr{padding-left:0}}
footer{padding:34px 0 46px;color:var(--dim);font-size:12.5px;border-top:1px solid var(--line);margin-top:60px}
footer .wrap{display:flex;justify-content:space-between;gap:14px;flex-wrap:wrap;font-family:var(--mono);letter-spacing:.06em}

/* ───────── detail view ───────── */
.detail-head{padding:44px 0 8px}
.backbtn{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12.5px;letter-spacing:.12em;color:var(--mut);padding:9px 14px;border:1px solid var(--line2);border-radius:9px;transition:color .2s,border-color .2s;margin-bottom:30px}
.backbtn:hover{color:var(--amber);border-color:rgba(196,163,106,.4)}
.detail-title{display:flex;flex-wrap:wrap;align-items:flex-end;gap:14px 26px}
.detail-title h1{font-family:var(--serif);font-size:clamp(30px,6.5vw,50px);font-weight:900;letter-spacing:-.01em;line-height:1.16}
.detail-meta{color:var(--mut);font-size:14.5px;margin-top:10px}
.detail-meta .sep{color:var(--dim);margin:0 8px}
.detail-links{display:flex;gap:10px;margin-top:22px;flex-wrap:wrap}

/* CH02 — full-page center alignment */
.center-page{text-align:center}
.center-page .detail-title{justify-content:center}
.center-page > .detail-head > p{max-width:42em;margin:14px auto 0}
.center-page .detail-links{justify-content:center}
.center-page .click-hint{justify-content:center}
.center-page .eyebrow{justify-content:center}
.center-page .chips{justify-content:center}
.center-page .pdesc{margin-left:auto;margin-right:auto}
.center-page .flow{justify-content:center}
.center-page .photo-strip{justify-content:center}
.ns-motion-cap{display:block;width:100%;margin-top:26px}
.ns-motion-cap .ch-thumbs{display:block;width:100%;max-width:none;justify-self:auto;overflow:hidden}
.ns-motion-cap .th{width:150px;aspect-ratio:16/9}
.ns-motion-cap .th img{object-fit:contain;background:var(--panel2)}
.mag-marquee{display:block;width:100%;margin-top:22px}
.mag-marquee .ch-thumbs{display:block;width:100%;max-width:none;justify-self:auto;overflow:hidden}
.mag-marquee .th{width:230px;aspect-ratio:16/9}
.mag-marquee .th img{object-fit:cover}
.sinquant-hero{display:flex;flex-direction:column;gap:28px;margin-top:22px}
.sinquant-titlelockup{display:flex;justify-content:center;margin-top:14px;padding:10px 0}
.sinquant-titlelockup + .pdesc{margin-top:10px}
.sinquant-logo{width:auto;height:134px;object-fit:contain;filter:drop-shadow(0 0 12px rgba(255,255,255,.85)) drop-shadow(0 0 2px #fff)}
.vgrid.ns-ytgrid{grid-template-columns:repeat(3,1fr)}
.sinquant-caps{display:flex;flex-wrap:wrap;justify-content:center;gap:10px}
.sinquant-cap{display:inline-flex;align-items:center;line-height:1.3;font-size:11.5px;font-weight:700;color:var(--amber2);border:1px solid rgba(196,163,106,.4);background:var(--amber-dim);border-radius:99px;padding:8px 16px;flex-shrink:0;text-wrap:balance}
.ns-course-panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--rad-s);overflow:hidden}
.ns-course-cols{display:grid;grid-template-columns:1fr 1fr}
.ns-course-col{display:flex;flex-direction:column;min-width:0}
.ns-course-col:first-child{border-right:1px solid var(--line2)}
@media(max-width:640px){.ns-course-cols{grid-template-columns:1fr}.ns-course-col:first-child{border-right:none;border-bottom:1px solid var(--line2)}}
.ns-course-row{align-items:flex-start}
.ns-course-idx{font-family:var(--mono);font-size:11px;color:var(--dim);flex:none;padding-top:1px}
.ns-course-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.ns-course-info b{font-size:12.5px;color:var(--ink);font-weight:600;line-height:1.4}
.ns-course-info i{font-style:normal;font-family:var(--mono);font-size:10.5px;color:var(--amber2)}

.program{padding:clamp(38px,6vw,58px) 0;border-top:1px solid var(--line)}
.program:first-of-type{border-top:none}

function allVideoIds(c){
  const ids = [];
  (c.programs||[]).forEach(p=>(p.videos||[]).forEach(v=>{ if (v.id && !ids.includes(v.id)) ids.push(v.id); }));
  return ids.length ? ids : (c.thumbs||[]);
}
const THUMB_PX_PER_SEC = 34;
function thumbHTML(c){
  if (c.soon) return `<div class="ch-thumbs" aria-hidden="true">
    <div class="th txt"><b>CH ${c.ch}</b><span>준비 중</span></div>
    <div class="th txt"><b>SOON</b><span>Coming</span></div>
    <div class="th txt"><b>2025</b><span>NEW</span></div></div>`;
  const cells = [
    ...allVideoIds(c).map(id=>`<div class="th"><img src="${YT(id)}" alt="" loading="eager" onerror="this.style.opacity='0'"></div>`),
    ...(c.imgThumbs||[]).map(src=>`<div class="th"><img src="${esc(src)}" alt="" loading="eager"></div>`),
  ];
  if (cells.length){
    const grp = `<div class="mgrp">${cells.join('')}</div>`;
    return `<div class="ch-thumbs" aria-hidden="true"><div class="track">${grp}${grp}</div></div>`;
  }
  return '';
}
/* measures each marquee's single group width at render time and sets the loop
   duration from it — avoids drift when a card/thumb size is overridden per-context */
function primeMarquees(root){
  (root||document).querySelectorAll('.tool-track, .ch-thumbs .track, .p2-track, .p3-track').forEach(track=>{
    let grp = track.querySelector('.mgrp');
    if (!grp) return;
    // if one sequence is narrower than the screen, repeat the sequence until it
    // exceeds screen width before duplicating — otherwise the loop shows a blank gap.
    // compares against window width (not an ancestor's clientWidth) because some
    // marquee containers shrink-to-fit their own content (overflow:auto + width:auto),
    // which would make that measurement circular
    const screenW = window.innerWidth * (track.closest('.ch-thumbs.deco') ? 2 : 1);
    if (grp.scrollWidth > 0 && grp.scrollWidth < screenW){
      const reps = Math.ceil(screenW / grp.scrollWidth) + 1;
      const repeatedHTML = grp.innerHTML.repeat(reps);
      track.querySelectorAll('.mgrp').forEach(g=>{ g.innerHTML = repeatedHTML; });
      grp = track.querySelector('.mgrp');
    }
    const w = grp.scrollWidth;
    const pxPerSec = track.closest('.ch-thumbs.fast') ? THUMB_PX_PER_SEC*2.8 : THUMB_PX_PER_SEC;
    track.style.animationDuration = Math.max(6, w / pxPerSec).toFixed(1) + 's';
  });
}
/* keeps the P6 episode-guide list the exact height of the NOW PLAYING card */
function syncLiveHeights(){
  const now = document.querySelector('.live-now');
  const guide = document.querySelector('.live-guide');
  if (!now || !guide) return;
  if (matchMedia('(max-width:720px)').matches){ guide.style.height = ''; return; }
  guide.style.height = now.getBoundingClientRect().height + 'px';
}
window.addEventListener('resize', ()=>{ if (document.querySelector('.live-panel')) syncLiveHeights(); });

/* desktop mouse wheel + drag-to-scroll for horizontal strips (no touchpad needed) */
function enableHScroll(el){
  if (!el || el.dataset.hbound) return;
  el.dataset.hbound = '1';
  el.addEventListener('wheel', e=>{
    if (el.scrollWidth <= el.clientWidth) return;
    el.scrollLeft += e.deltaY;
    e.preventDefault();
  }, {passive:false});
  let down=false, startX=0, startScroll=0;
  el.addEventListener('mousedown', e=>{ down=true; el.classList.add('dragging'); startX=e.pageX; startScroll=el.scrollLeft; });
  window.addEventListener('mouseup', ()=>{ down=false; el.classList.remove('dragging'); });
  window.addEventListener('mousemove', e=>{
    if (!down) return;
    el.scrollLeft = startScroll - (e.pageX - startX);
  });
}

/* ── detail blocks ── */
function flowHTML(steps){
  return `<div class="flow-label">WORKFLOW</div><div class="flow">${steps.map((s,i)=>
    `<span class="step"><b>${String(i+1).padStart(2,'0')}</b>${esc(s)}</span>${i<steps.length-1?'<span class="arr">→</span>':''}`).join('')}</div>`;
}
function videosHTML(p){
  return `<div class="${p.grid||'vgrid'} ${p.shorts?'shorts':''}">${p.videos.map(v=>{
    const playable = !!v.id && !v.unavailable;
    return `<button class="vcard ${playable?'':'noplay'}" ${playable?`data-play="${v.id}"`:''} ${v.playlist?`data-list="${v.playlist}"`:''} ${p.shorts?'data-vert="1"':''} data-title="${esc(v.label||p.t)}" data-t="${esc(v.unavailable?'비공개 처리된 영상입니다':(v.label||p.t))}">
      ${v.id?`<img src="${v.thumb||YT(v.id)}" alt="${esc(v.label||p.t)} 썸네일" loading="lazy" onerror="this.closest('.vcard').classList.add('noimg')">`:''}
      ${playable?`<span class="play" aria-hidden="true"><i>▶</i></span>`:''}
      ${v.unavailable?`<span class="badge" style="position:absolute;top:8px;right:8px">비공개</span>`:''}
      ${v.label?`<span class="vlabel">${esc(v.label)}</span>`:''}
    </button>`;
  }).join('')}</div>`;
}
function programHTML(p, idx){
  let h = `<div class="program reveal"><div class="program-head">
    <span class="eyebrow">Program ${String(idx+1).padStart(2,'0')}</span>
    <h2>${esc(p.t)}</h2>
    ${p.tag?`<div class="tagline">${esc(p.tag)}</div>`:''}
    ${p.d?`<p class="pdesc">${esc(p.d)}</p>`:''}
  </div>`;
  // 33-A: quote-card lead-in (KBS feature) → media (videos/marquee/photos) → text blocks → WORKFLOW last
  if (p.exts) h += `<div class="ext-grid">${p.exts.map(e=>`
    <a class="ext" href="${e.url}" target="_blank" rel="noopener">
      <span class="k">${esc(e.k)}</span><h4>${esc(e.h)}</h4>
      <span class="q">${esc(e.q)}</span><p>${esc(e.p)}</p>
      <span class="go">${esc(e.go)}</span></a>`).join('')}</div>`;
  const chipBlockHTML = () => p.chips ? `<div class="chip-block"><div class="cl">${esc(p.chips.label)}</div><div class="chips">${p.chips.items.map(c=>`<span class="chip">${esc(c)}</span>`).join('')}</div></div>` : '';
  if (p.chips && p.chipsBeforeMedia) h += chipBlockHTML();
  if (p.videos) h += videosHTML(p);
  if (p.marquee) h += `<div class="mag-marquee">${decoImgMarqueeHTML(p.marquee)}</div>`;
  if (p.photos) h += `<div class="photo-strip">${p.photos.map(src=>`<img src="${src}" alt="" loading="lazy">`).join('')}</div>`;
  if (p.photoGrid) h += `<div class="photo-grid cols-${p.photoGridCols||4}">${p.photoGrid.map(src=>`<img src="${src}" alt="" loading="lazy">`).join('')}</div>`;
  if (p.highlights) h += `<div class="hl-grid">${p.highlights.map(x=>`<div class="hl">${esc(x)}</div>`).join('')}</div>`;
  if (p.cards) h += `<div class="info-cards">${p.cards.map(c=>`<div class="icard"><h4>${esc(c.h)}</h4><p>${esc(c.p)}</p></div>`).join('')}</div>`;
  if (p.episodes) h += `<div class="ep-grid">${p.episodes.map(e=>`<div class="ep"><h4>${esc(e.q)}</h4><p>${esc(e.p)}</p></div>`).join('')}</div>`;
  if (p.ticker) h += `<div class="ticker" aria-label="수강생 후기"><div class="lane">${[...p.ticker,...p.ticker].map(t=>`<span>${esc(t)}</span>`).join('')}</div></div>`;
  if (p.chips && !p.chipsBeforeMedia) h += chipBlockHTML();
  if (p.chips2) h += p.chips2.map(cb=>`<div class="chip-block"><div class="cl">${esc(cb.label)}</div><div class="chips">${cb.items.map(c=>`<span class="chip ${cb.hl?'hl':''}">${esc(c)}</span>`).join('')}</div></div>`).join('');
  if (p.flow) h += flowHTML(p.flow);
  if (p.links) h += `<div class="detail-links">${p.links.map(l=>`<a class="btn btn-ghost" href="${l.url}" target="_blank" rel="noopener">${esc(l.label)}</a>`).join('')}</div>`;
  return h + '</div>';
}

function cleanTitle(t){ return (t||'').replace(/\s*#\S+(\s+#\S+)*\s*$/,'').replace(/\s{2,}/g,' ').trim(); }
function vcardHTML(id, title, opts={}){
  const vert = !!opts.vert;
  const label = cleanTitle(title);
  const badge = opts.badgeHTML ? opts.badgeHTML : (opts.badge ? `<span class="badge cbadge">${esc(opts.badge)}</span>` : '');
  return `<button class="vcard${vert?' vert':''}${opts.cls?(' '+opts.cls):''}" data-play="${id}" ${vert?'data-vert="1"':''} data-title="${esc(label)}" data-t="${esc(label)}">
    <img src="${YT(id)}" alt="${esc(label)} 썸네일" loading="${opts.eager?'eager':'lazy'}" onerror="this.closest('.vcard').classList.add('noimg')">
    <span class="play" aria-hidden="true"><i>▶</i></span>
    ${badge}
    <span class="vlabel">${esc(label)}</span>
  </button>`;
}
const DECO_FALLBACK_IMG = 'assets/thumbs/manual-service.jpg';
function decoMarqueeHTML(ids){
  const cells = ids.map(id=>`<div class="th"><img src="${YT(id)}" alt="" loading="eager" onerror="this.onerror=null;this.src='${DECO_FALLBACK_IMG}'"></div>`).join('');
  const grp = `<div class="mgrp">${cells}</div>`;
  return `<div class="ch-thumbs deco" aria-hidden="true"><div class="track">${grp}${grp}</div></div>`;
}
function staticThumbStripHTML(ids){
  return ids.map(id=>`<div class="th"><img src="${YT(id)}" alt="" loading="eager" onerror="this.onerror=null;this.src='${DECO_FALLBACK_IMG}'"></div>`).join('');
}
function decoImgMarqueeHTML(srcs, fast){
  const cells = srcs.map(src=>`<div class="th"><img src="${esc(src)}" alt="" loading="eager"></div>`).join('');
  const grp = `<div class="mgrp">${cells}</div>`;
  return `<div class="ch-thumbs deco${fast?' fast':''}" aria-hidden="true"><div class="track">${grp}${grp}</div></div>`;
}
function p2MarqueeHTML(items, reverse){
  const cardsHTML = items.map(v=>vcardHTML(v.id, v.t, {vert:true, eager:true})).join('');
  const grp = `<div class="mgrp">${cardsHTML}</div>`;
  return `<div class="p2-marquee"><div class="p2-track${reverse?' rev':''}">${grp}${grp}</div></div>`;
}
function p3MarqueeHTML(items, reverse){
  const cardsHTML = items.map(v=>vcardHTML(v.id, v.t, {badge:v.badge, eager:true})).join('');
  const grp = `<div class="mgrp">${cardsHTML}</div>`;
  return `<div class="p3-marquee"><div class="p3-track${reverse?' rev':''}">${grp}${grp}</div></div>`;
}

          <span class="nm">${esc(a.n)}</span>
          <span class="prize">${esc(a.prize)}</span>
          ${a.img?`<button class="lk" data-img="${esc(a.img)}" data-title="${esc(a.n)} 상장">상장 보기 ↗</button>`:'<span></span>'}
        </div>`).join('')}</div></div>`;
    }
  }
  app.innerHTML = `
  <div class="${c.buildProjects?'':'center-page'}">
    <div class="detail-head">
      <a class="backbtn" href="#/">← BACK TO CH GUIDE</a>
      <span class="eyebrow">Channel ${c.ch}</span>
      <div class="detail-title" style="margin-top:12px"><h1>${esc(c.company)}</h1></div>
      <div class="detail-meta">${esc(c.role)}<span class="sep">|</span><span class="mono" style="font-size:13px;color:var(--amber2)">${esc(c.period)}</span></div>
      ${c.desc?`<p style="color:var(--ink);font-size:15px;max-width:42em;margin-top:14px;opacity:.92">${esc(c.desc)}</p>`:''}
      ${c.channel?`<div class="detail-links"><a class="btn btn-amber" href="${c.channel.url}" target="_blank" rel="noopener">${esc(c.channel.label)} ↗</a></div>`:''}
      ${(!c.soon && !c.buildProjects && c.id!=='kbs' && c.id!=='freelance')?`<p class="click-hint">썸네일을 클릭하면 영상으로 이동합니다</p>`:''}
    </div>
    ${body}
  </div>
  <div style="padding:40px 0 20px"><a class="backbtn" href="#/">← BACK TO CH GUIDE</a></div>`;
  window.scrollTo({top:0, behavior:'instant'});
  primeMarquees();
  observeReveals();
  document.querySelectorAll('.ig-strip').forEach(enableHScroll);
  if (document.querySelector('.live-panel')) requestAnimationFrame(syncLiveHeights);
}

/* ═══════════ interactions ═══════════ */
function bindHub(){
  app.querySelectorAll('[data-go]').forEach(el=>el.addEventListener('click',()=>{ location.hash = '#/ch/'+el.dataset.go; }));
}
document.addEventListener('click', e=>{
  const p = e.target.closest('[data-play]');
  if (p){ openLB(p.dataset.play, p.dataset.title||'', p.dataset.list||'', !!p.dataset.vert); return; }
  const im = e.target.closest('[data-img]');
  if (im){ openImgLB(im.dataset.img, im.dataset.title||''); return; }
  const a = e.target.closest('[data-anchor]');
  if (a){ e.preventDefault();
    const go = ()=>{ const t = document.getElementById(a.dataset.anchor); if(t) t.scrollIntoView({behavior:'smooth'}); };
    if (location.hash && location.hash !== '#/' ) { location.hash = '#/'; setTimeout(go, 60); } else go();
  }
});

/* lightbox */
const lb = document.getElementById('lb'), lbFrame = document.getElementById('lbFrame'),
      lbTitle = document.getElementById('lbTitle'), lbInner = document.getElementById('lbInner');
function openLB(id, title, list, vert){
  lbInner.classList.toggle('vert', vert);
  const l = list ? `&list=${list}` : '';
  const origin = `&origin=${encodeURIComponent(location.origin)}`;
  lbFrame.innerHTML = `<iframe src="https://www.youtube-nocookie.com/embed/${id}?autoplay=0&rel=0${l}${origin}" title="${esc(title)}" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen></iframe>`;
  lbTitle.textContent = title;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function openImgLB(src, title){
  lbInner.classList.remove('vert');
  lbInner.classList.add('imgmode');
  lbFrame.innerHTML = `<img src="${esc(src)}" alt="${esc(title)}">`;
  lbTitle.textContent = title;
  lb.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLB(){
  lb.classList.remove('open'); lbFrame.innerHTML = ''; lbInner.classList.remove('imgmode'); document.body.style.overflow = '';
}
document.getElementById('lbClose').addEventListener('click', closeLB);
lb.addEventListener('click', e=>{ if(e.target===lb) closeLB(); });
document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeLB(); });

/* reveal on scroll */
let io;
function observeReveals(){
  if (io) io.disconnect();
  if (matchMedia('(prefers-reduced-motion: reduce)').matches){
    document.querySelectorAll('.reveal').forEach(el=>el.classList.add('in')); return;
  }
  io = new IntersectionObserver(es=>es.forEach(x=>{ if(x.isIntersecting){ x.target.classList.add('in'); io.unobserve(x.target);} }),{threshold:.08});
  document.querySelectorAll('.reveal').forEach(el=>io.observe(el));
}

/* timecode */
(function(){
  const el = document.getElementById('tc');
  if (matchMedia('(prefers-reduced-motion: reduce)').matches){ el.textContent='00:00:00:00'; return; }
  const t0 = Date.now();
  setInterval(()=>{
    const ms = Date.now()-t0, f = Math.floor(ms/33.34)%30,
      s = Math.floor(ms/1e3)%60, m = Math.floor(ms/6e4)%60, h = Math.floor(ms/36e5)%24;
    el.textContent = [h,m,s,f].map(x=>String(x).padStart(2,'0')).join(':');
  }, 33);
})();

/* router */
function route(){
  closeLB();
  const h = location.hash;
  const m = h.match(/^#\/ch\/([\w-]+)/);
  if (m) renderDetail(m[1]); else renderHub();
}
window.addEventListener('hashchange', route);
route();
</script>
